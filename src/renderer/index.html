<!doctype html>
<html lang="en" class="dark" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Chromium Browser is a desktop browser shell with tabs, reader mode, downloads, bookmarks, and privacy-focused controls."
    />
    <meta name="theme-color" content="#111318" />
    <style>
      :root {
        color-scheme: dark;
        background: #000000;
        --app-bg-primary: #000000;
        --app-bg-secondary: #1c1c1e;
        --app-bg-tertiary: #2c2c2e;
        --app-text-primary: #ffffff;
        --bg-solid-fallback: #000000;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: var(--app-bg-primary);
        color: var(--app-text-primary);
      }

      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>

    <title>Chromium Browser</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
